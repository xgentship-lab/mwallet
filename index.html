<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download My App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: #ffffff10;
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        img {
            width: 100px;
            border-radius: 20px;
        }

        h1 {
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 25px;
            background: #00c853;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 10px;
        }

        .btn:hover {
            background: #00a844;
        }

        .note {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/100" alt="App Logo">

    <h1>My App</h1>
    <p>Fast • Secure • Easy to Use</p>

    <!-- 🔥 Replace link below with your GitHub APK link -->
    <a class="btn" href="YOUR_APK_LINK_HERE" download>
        Download APK
    </a>

    <div class="note">
        ⚠ Enable "Install from Unknown Sources" to install.
    </div>
</div>

</body>
</html>
